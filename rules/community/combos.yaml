# Co-occurring import-bound primitive categories in the same changed file. Loose combos (no dataflow
# taint tracking): a decode and an exec in the same file score, without proving the bytes flow between them.
- id: combo-fetch-exec
  description: A network fetch and an exec/eval co-occur (download-and-run a second stage).
  applies_to: code
  weight: 45
  attack_type: network-exec
  match:
    all:
      - bound_call: {category: network}
      - bound_call: {category: exec}

- id: combo-decode-exec
  description: A decode (base64/pickle/marshal/zlib) and an exec/eval co-occur (loose loader signal).
  applies_to: code
  weight: 45
  attack_type: obfuscated-loader
  match:
    all:
      - bound_call: {category: decode}
      - bound_call: {category: exec}

- id: combo-cred-network
  description: A credential read (env tokens / ~ expansion) and a network call co-occur (possible exfil).
  applies_to: code
  weight: 45
  attack_type: credential-exfil
  match:
    all:
      - bound_call: {category: credential}
      - bound_call: {category: network}
