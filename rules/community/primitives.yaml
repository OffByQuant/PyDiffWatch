# Code-level primitive and obfuscation signals. Weights are baseline defaults — tune for your corpus.
- id: syntax-error-suspicious
  description: A complete .py/.pyx/.pyi file fails to parse (often obfuscation, packing, or a dropped binary blob).
  applies_to: code
  weight: 20
  location_scaled: true
  attack_type: obfuscation
  match: {syntax_error: true}

- id: primitives
  description: >
    Any import-bound dangerous primitive (process/exec/network/decode/credential) OR an encoded blob is
    present on added lines. Corroboration only — fixed low weight; the combos and auto-exec rules escalate.
  applies_to: code
  weight: 5
  location_scaled: true
  attack_type: primitive-use
  match:
    any:
      - bound_call: {category: [decode, exec, process, network, credential]}
      - blob_present: true

- id: autoexec-location
  description: >
    A dangerous primitive (process/exec/network) that RUNS AT IMPORT TIME in an auto-exec location
    (setup.py, pyproject.toml, __init__.py, .pth) — where install/import-time supply-chain malware must
    live. autoexec_call (not bound_call) excludes primitives buried in method bodies that only run when
    the package's own runtime calls them (a runtime feature, not an install hook).
  applies_to: code
  weight: 45
  attack_type: install-hook
  match:
    all:
      - location_at_least: 3.0
      - any:
          - autoexec_call: {category: process}
          - autoexec_call: {category: exec}
          - autoexec_call: {category: network}
